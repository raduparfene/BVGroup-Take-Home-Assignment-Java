server.port=${SERVER_PORT:8081}

spring.application.name=processing-app
spring.jackson.property-naming-strategy=SNAKE_CASE

hipsum.base-url=${HIPSUM_BASE_URL:https://hipsum.co}
hipsum.max-concurrency=${HIPSUM_MAX_CONCURRENCY:8}
hipsum.type=${HIPSUM_TYPE:hipster-centric}

app.kafka.topic-name=${KAFKA_TOPIC_NAME:words.processed}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties[enable.idempotence]=true
spring.kafka.producer.properties[max.in.flight.requests.per.connection]=5
spring.kafka.producer.properties[max.block.ms]=${KAFKA_MAX_BLOCK_MS:5000}
spring.kafka.producer.properties[request.timeout.ms]=${KAFKA_REQUEST_TIMEOUT_MS:10000}
spring.kafka.producer.properties[delivery.timeout.ms]=${KAFKA_DELIVERY_TIMEOUT_MS:15000}
spring.kafka.producer.properties[reconnect.backoff.ms]=${KAFKA_RECONNECT_BACKOFF_MS:1000}
spring.kafka.producer.properties[reconnect.backoff.max.ms]=${KAFKA_RECONNECT_BACKOFF_MAX_MS:10000}

logging.level.org.apache.kafka.clients=${KAFKA_CLIENT_LOG_LEVEL:WARN}
