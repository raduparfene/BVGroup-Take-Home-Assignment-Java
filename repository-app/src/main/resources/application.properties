server.port=${SERVER_PORT:8082}

spring.application.name=repository-app
spring.jackson.property-naming-strategy=SNAKE_CASE

app.history.limit=${HISTORY_LIMIT:10}

app.kafka.topic-name=${KAFKA_TOPIC_NAME:words.processed}
app.kafka.consumer-concurrency=${KAFKA_CONSUMER_CONCURRENCY:4}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:repository-app}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.listener.ack-mode=record

spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./.local-data/betvictor}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

logging.level.org.apache.kafka.clients=${KAFKA_CLIENT_LOG_LEVEL:WARN}
