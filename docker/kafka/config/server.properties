# Single Kafka node for local development
process.roles=broker,controller
node.id=1
controller.quorum.voters=1@kafka:9093

# Docker clients use kafka:9092; host clients use localhost:9092
listeners=INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
advertised.listeners=INTERNAL://kafka:9092,EXTERNAL://localhost:9092
listener.security.protocol.map=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
inter.broker.listener.name=INTERNAL
controller.listener.names=CONTROLLER

# A single broker cannot use Kafka's default replication factor of three
offsets.topic.replication.factor=1

# Store Kafka data in the mounted volume
log.dirs=/var/lib/kafka/data
